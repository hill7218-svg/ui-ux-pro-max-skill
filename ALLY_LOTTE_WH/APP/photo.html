<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>📷 照相驗收</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a1a; min-height: 100vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.header {
  padding: 12px 16px; background: #0D1B3E; color: #fff; font-weight: 700;
  font-size: 16px; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 10;
}
.header .status { font-size: 12px; opacity: 0.9; }
.container {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 12px; padding: 12px; padding-bottom: 28px;
}

/* === 相機 === */
.video-wrap {
  position: relative; width: 100%; border-radius: 10px; overflow: hidden;
  background: #000; aspect-ratio: 4/3; max-height: 300px;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }

/* QR 掃描框 */
.scan-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.scan-box {
  width: 55%; aspect-ratio: 1; border: 3px solid #00e676;
  border-radius: 8px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
  animation: scanPulse 1.8s ease-in-out infinite;
}
@keyframes scanPulse { 0%,100%{border-color:#00e676} 50%{border-color:#64ffda} }
.scan-label {
  position: absolute; bottom: 12px; left: 0; right: 0;
  text-align: center; color: #fff; font-size: 13px; font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
}

/* 拍照框（無掃描動畫） */
.photo-overlay {
  position: absolute; inset: 0; pointer-events: none;
  border: 3px solid rgba(255,255,255,0.25); border-radius: 10px;
}

/* === 資訊面板 === */
.info-panel {
  background: rgba(255,255,255,0.96); border-radius: 10px; padding: 14px;
  width: 100%; color: #0D1B3E; font-size: 13px;
}
.info-panel.confirmed { border: 2px solid #007B6F; }
.info-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: flex-start; }
.info-row:last-child { margin-bottom: 0; }
.info-label { font-weight: 700; min-width: 60px; color: #6B7A99; font-size: 12px; flex-shrink: 0; }
.info-value { font-weight: 600; text-align: right; flex: 1; margin-left: 8px; font-family: "JetBrains Mono", monospace; word-break: break-all; font-size: 12px; }

/* === 버튼 === */
.button-row { display: flex; gap: 10px; width: 100%; margin-top: 2px; }
.btn {
  padding: 15px 18px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer; flex: 1;
  transition: all .15s; -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.3px;
}
.btn-primary { background: #007B6F; color: #fff; }
.btn-primary:active { background: #005a52; transform: scale(0.97); }
.btn-primary:disabled { background: #aaa; cursor: not-allowed; opacity: .6; }
.btn-secondary { background: #6B7A99; color: #fff; }
.btn-secondary:active { background: #4a5570; transform: scale(0.97); }
.btn-success { background: #155724; color: #fff; }
.btn-success:active { background: #0d3a18; transform: scale(0.97); }
.btn-outline { background: transparent; color: #6B7A99; border: 2px solid #6B7A99; }
.btn-outline:active { background: #f0f0f0; }

/* === 訊息 === */
.message { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; width: 100%; white-space: pre-line; }
.message.info    { background: #d1ecf1; color: #0c5460; }
.message.success { background: #d4edda; color: #155724; }
.message.error   { background: #f8d7da; color: #721c24; }
.message.loading { background: #cfe2ff; color: #084298; }
.message.warn    { background: #fff3cd; color: #856404; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(8,66,152,.3); border-radius: 50%; border-top-color: #084298; animation: spin .8s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* === 上傳成功 badge === */
.upload-badge {
  background: #007B6F; color: #fff; border-radius: 999px;
  padding: 4px 12px; font-size: 12px; font-weight: 700;
  display: inline-block; margin-bottom: 4px;
}

#canvas { display: none; }

/* === 變焦 / 對焦 === */
.zoom-control {
  position: absolute; left: 10px; right: 10px; bottom: 10px;
  display: none; align-items: center; gap: 10px;
  background: rgba(0,0,0,0.45); border-radius: 999px; padding: 6px 14px;
  backdrop-filter: blur(4px); z-index: 6;
}
.zoom-control.show { display: flex; }
.zoom-control .zoom-icon { color: #fff; font-size: 15px; flex-shrink: 0; }
.zoom-control input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 4px; background: rgba(255,255,255,0.5);
  outline: none;
}
.zoom-control input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #00e676; border: 2px solid #fff; cursor: pointer;
}
.zoom-control input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: #00e676; border: 2px solid #fff; cursor: pointer;
}
.zoom-control .zoom-val { color: #fff; font-size: 12px; font-weight: 700; min-width: 34px; text-align: right; }

/* 點擊對焦光圈 */
.focus-ring {
  position: absolute; width: 70px; height: 70px;
  border: 2px solid #00e676; border-radius: 50%;
  transform: translate(-50%, -50%) scale(1.4); opacity: 0;
  pointer-events: none; z-index: 7;
  box-shadow: 0 0 8px rgba(0,230,118,0.6);
}
.focus-ring.animate { animation: focusPulse 0.6s ease-out; }
@keyframes focusPulse {
  0%   { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
  30%  { transform: translate(-50%,-50%) scale(1.0); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0.9); opacity: 0; }
}
.tap-hint {
  position: absolute; top: 8px; left: 0; right: 0; text-align: center;
  color: #fff; font-size: 11px; font-weight: 600; z-index: 5;
  text-shadow: 0 1px 4px rgba(0,0,0,.8); pointer-events: none;
  display: none;
}
.tap-hint.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>📷 照相驗收</div>
  <div class="status" id="status">啟動中...</div>
</div>

<div class="container">
  <!-- 相機畫面 -->
  <div class="video-wrap" id="videoWrap">
    <video id="video" playsinline autoplay muted></video>
    <!-- QR 掃描框 (scan mode) -->
    <div class="scan-overlay" id="scanOverlay">
      <div class="scan-box"></div>
      <div class="scan-label">對準貼紙 QR Code</div>
    </div>
    <!-- 拍照框 (photo mode) -->
    <div class="photo-overlay" id="photoOverlay" style="display:none"></div>
    <!-- 點擊對焦提示 + 光圈 -->
    <div class="tap-hint" id="tapHint">👆 點畫面對焦</div>
    <div class="focus-ring" id="focusRing"></div>
    <!-- 變焦滑桿 -->
    <div class="zoom-control" id="zoomControl">
      <span class="zoom-icon">🔍</span>
      <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1">
      <span class="zoom-val" id="zoomVal">1.0x</span>
    </div>
  </div>

  <!-- 棧板資訊 -->
  <div class="info-panel" id="infoPanel">
    <div class="info-row"><span class="info-label">入庫單號</span><span class="info-value" id="palletId">— 掃描 QR Code 後顯示 —</span></div>
    <div class="info-row"><span class="info-label">商品</span><span class="info-value" id="palletSku">—</span></div>
    <div class="info-row"><span class="info-label">名稱</span><span class="info-value" id="palletName">—</span></div>
    <div class="info-row"><span class="info-label">數量</span><span class="info-value" id="palletQty">—</span></div>
    <div class="info-row"><span class="info-label">儲位</span><span class="info-value" id="palletDest">—</span></div>
  </div>

  <div id="messageArea"></div>

  <!-- 按鈕區（依狀態切換） -->

  <!-- SCAN 模式按鈕 -->
  <div class="button-row" id="btnScan">
    <button class="btn btn-outline" onclick="manualIdMode()">⌨️ 手動輸入 ID</button>
  </div>

  <!-- CONFIRM 模式按鈕 -->
  <div class="button-row" id="btnConfirm" style="display:none">
    <button class="btn btn-outline" onclick="goScan()">↩ 重新掃描</button>
    <button class="btn btn-primary" onclick="goPhoto()">📷 確認拍照</button>
  </div>

  <!-- PHOTO 模式按鈕 -->
  <div class="button-row" id="btnPhoto" style="display:none">
    <button class="btn btn-primary" id="captureBtn" onclick="capturePhoto()">📷 拍照</button>
  </div>

  <!-- DONE 模式按鈕（上傳成功後） -->
  <div class="button-row" id="btnDone" style="display:none">
    <button class="btn btn-secondary" onclick="retryPhoto()">🔄 再拍一張</button>
    <button class="btn btn-success" onclick="nextPallet()">➡ 下一板</button>
  </div>
</div>

<!-- 手動輸入 modal（備用） -->
<div id="manualModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:12px;padding:24px 20px;width:100%;max-width:400px">
    <h3 style="color:#0D1B3E;margin-bottom:8px">⌨️ 手動輸入棧板 ID</h3>
    <p style="color:#666;font-size:12px;margin-bottom:16px">請輸入或貼上棧板 ID（可用條碼 App 掃一維條碼後貼上）</p>
    <input id="manualInput" type="text" placeholder="LOTTE-20260622-..."
      style="width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;font-family:monospace"
      autocomplete="off" spellcheck="false" />
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1" onclick="closeManual()">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmManual()">確認</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
/* ============================================================
   照相驗收 v2 — QR 掃描 → 確認 → 拍照 → 下一板
   GAS v7.0 後端 API:
     POST text/plain {action:'uploadPhoto', imageData, filename, folderId}
     POST text/plain {action:'append', tab, rows:[[...]]}
     GET  ?tab=棧板資訊
   ============================================================ */

const CONFIG = {
  webAppUrl: 'https://script.google.com/macros/s/AKfycbxlx-rJ4UdHq6QhpFggF1g5KajsP3UnJd7xa9Ghw9sv6eeuJELPh57dlQIC58pkkNVr/exec',
  folderId: '',
  logTab: '照相記錄',
  palletTab: '棧板資訊'
};

// 狀態：scan | confirm | photo | done
let STATE = 'scan';
// 【鎖定規範】QR = 入庫單號(orderId)。orderId 同時用於：檔名、Sheet 記錄、畫面顯示、查商品數量。
const APP = { orderId: null, stream: null, uploadCount: 0 };
let scanRAF = null;
let scanLocked = false;   // 防止 QR 重複觸發
let palletCache = null;   // 從 GAS 讀到的全部棧板資料

// ============ 啟動 ============
window.addEventListener('DOMContentLoaded', async () => {
  // 先看 URL 有沒有 ?id= (URL QR 直開模式)
  const urlId = new URLSearchParams(window.location.search).get('id');
  await startCamera();

  if (urlId) {
    APP.orderId = urlId;
    showPalletId(urlId);
    fetchPalletCache().then(() => fillPalletInfo(urlId));
    goConfirm();
  } else {
    goScan();
    fetchPalletCache();  // 預載棧板資料，QR 掃到後查詢更快
  }
});

// ============ 手動確認 ID（無 URL 參數時使用）============
async function confirmManualId() {
  const val = document.getElementById('manualIdInput').value.trim();
  if (!val) { showMessage('⚠️ 請輸入棧板 ID', 'error'); return; }
  APP.orderId = val;
  APP.uploadCount = 0;

  // 隱藏輸入面板，顯示相機 UI
  document.getElementById('idInputPanel').style.display = 'none';
  document.getElementById('video').style.display = 'block';
  document.getElementById('infoPanel').style.display = 'block';
  document.getElementById('palletId').textContent = APP.orderId;
  document.getElementById('status').textContent = '準備中...';

  await startCamera();
  fetchPalletCache().then(() => fillPalletInfo(APP.orderId));
  goConfirm();
}

// ============ 相機 ============
async function startCamera() {
  try {
    APP.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = APP.stream;
    await new Promise(r => document.getElementById('video').addEventListener('loadedmetadata', r, { once: true }));

    APP.track = APP.stream.getVideoTracks()[0];
    setupZoom();
    setupTapFocus();
  } catch (e) {
    showMsg('❌ 相機啟動失敗：' + e.message, 'error');
    document.getElementById('status').textContent = '相機錯誤';
  }
}

// ── 變焦：依裝置能力設定滑桿 ──
function setupZoom() {
  const slider = document.getElementById('zoomSlider');
  const valLbl = document.getElementById('zoomVal');
  let caps = {};
  try { caps = APP.track.getCapabilities ? APP.track.getCapabilities() : {}; } catch (_) {}

  if (caps && caps.zoom && caps.zoom.max && caps.zoom.max > caps.zoom.min) {
    // 硬體變焦（多數 Android 後鏡頭支援）
    APP.zoomMode = 'hardware';
    slider.min = caps.zoom.min;
    slider.max = caps.zoom.max;
    slider.step = caps.zoom.step || 0.1;
    slider.value = caps.zoom.min;
    valLbl.textContent = Number(caps.zoom.min).toFixed(1) + 'x';
  } else {
    // 軟體變焦（iOS / 不支援硬體變焦時，用 CSS 放大畫面）
    APP.zoomMode = 'software';
    slider.min = 1; slider.max = 5; slider.step = 0.1; slider.value = 1;
    valLbl.textContent = '1.0x';
  }

  slider.oninput = () => {
    const z = parseFloat(slider.value);
    valLbl.textContent = z.toFixed(1) + 'x';
    if (APP.zoomMode === 'hardware') {
      try { APP.track.applyConstraints({ advanced: [{ zoom: z }] }); } catch (_) {}
    } else {
      // CSS 放大（拍照時 canvas 會擷取放大後的畫面，需同步裁切）
      const v = document.getElementById('video');
      v.style.transform = `scale(${z})`;
      v.style.transformOrigin = 'center center';
      APP.softZoom = z;
    }
  };
}

// ── 點擊對焦 ──
function setupTapFocus() {
  const video = document.getElementById('video');
  let caps = {};
  try { caps = APP.track.getCapabilities ? APP.track.getCapabilities() : {}; } catch (_) {}
  APP.canFocus = !!(caps && caps.focusMode && caps.focusMode.includes('manual'));
  const supportsPOI = !!(caps && caps.pointsOfInterest);

  video.addEventListener('click', async (e) => {
    if (STATE !== 'photo') return;
    const wrap = document.getElementById('videoWrap');
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // 對焦光圈動畫
    const ring = document.getElementById('focusRing');
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    ring.classList.remove('animate');
    void ring.offsetWidth;  // reflow 重新觸發動畫
    ring.classList.add('animate');

    // 嘗試硬體對焦（支援的裝置）
    if (supportsPOI || APP.canFocus) {
      const adv = {};
      if (supportsPOI) {
        adv.pointsOfInterest = [{ x: x / rect.width, y: y / rect.height }];
      }
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        adv.focusMode = 'continuous';
      }
      try { await APP.track.applyConstraints({ advanced: [adv] }); } catch (_) {}
    }
  });
}

// ============ 狀態切換 ============
function goScan() {
  STATE = 'scan';
  APP.orderId = null;
  APP.uploadCount = 0;
  scanLocked = false;

  document.getElementById('scanOverlay').style.display = 'flex';
  document.getElementById('photoOverlay').style.display = 'none';
  hideCamControls();
  document.getElementById('infoPanel').classList.remove('confirmed');
  document.getElementById('palletId').textContent = '— 掃描 QR Code 後顯示 —';
  ['palletSku','palletName','palletQty','palletDest'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });

  showBtns('btnScan');
  showMsg('📲 請將 QR Code 對準框內', 'info');
  document.getElementById('status').textContent = '🔍 掃描中';
  startScanLoop();
}

function goConfirm() {
  STATE = 'confirm';
  stopScanLoop();
  document.getElementById('scanOverlay').style.display = 'none';
  document.getElementById('photoOverlay').style.display = 'none';
  hideCamControls();
  document.getElementById('infoPanel').classList.add('confirmed');
  showBtns('btnConfirm');
  showMsg('✅ QR Code 已辨識，確認資訊後開始拍照', 'success');
  document.getElementById('status').textContent = '✅ 已辨識';
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
}

function goPhoto() {
  STATE = 'photo';
  document.getElementById('photoOverlay').style.display = 'block';
  document.getElementById('zoomControl').classList.add('show');
  document.getElementById('tapHint').classList.add('show');
  showBtns('btnPhoto');
  document.getElementById('captureBtn').disabled = false;
  showMsg('📷 請對準棧板後拍照（可滑動變焦・點畫面對焦）', 'info');
  document.getElementById('status').textContent = '📷 拍照模式';
}

function hideCamControls() {
  document.getElementById('zoomControl').classList.remove('show');
  document.getElementById('tapHint').classList.remove('show');
  // 重置變焦，避免掃描畫面仍維持放大
  const slider = document.getElementById('zoomSlider');
  if (slider) {
    slider.value = slider.min;
    document.getElementById('zoomVal').textContent = Number(slider.min).toFixed(1) + 'x';
  }
  const v = document.getElementById('video');
  if (v) v.style.transform = 'none';
  APP.softZoom = 1;
  if (APP.zoomMode === 'hardware' && APP.track) {
    try { APP.track.applyConstraints({ advanced: [{ zoom: parseFloat(slider.min) }] }); } catch (_) {}
  }
}

function goDone(count) {
  STATE = 'done';
  showBtns('btnDone');
  document.getElementById('status').textContent = `✅ 已上傳 ${count} 張`;
}

// ============ QR 掃描迴圈 ============
function startScanLoop() {
  stopScanLoop();
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function tick() {
    if (STATE !== 'scan' || scanLocked) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const qr = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (qr && qr.data) {
        onQRFound(qr.data);
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}

function stopScanLoop() {
  if (scanRAF) { cancelAnimationFrame(scanRAF); scanRAF = null; }
}

function onQRFound(text) {
  scanLocked = true;
  // 【鎖定規範】QR = 入庫單號。相容純文字或 URL(?id=入庫單號)
  let orderId = text;
  try {
    const pid = new URL(text).searchParams.get('id');
    if (pid) orderId = pid;
  } catch (_) {}

  APP.orderId = orderId;
  showPalletId(orderId);
  fillPalletInfo(orderId);
  goConfirm();
}

// ============ 棧板資訊 ============
async function fetchPalletCache() {
  try {
    const res = await fetch(CONFIG.webAppUrl + '?tab=' + encodeURIComponent(CONFIG.palletTab));
    const j = await res.json().catch(() => ({}));
    if (j.ok && Array.isArray(j.values) && j.values.length > 1) {
      palletCache = j.values;
    }
  } catch (_) {}
}

function fillPalletInfo(key) {
  if (!palletCache) return;
  const headers = palletCache[0].map(h => String(h).trim());
  const col = n => headers.indexOf(n);
  // 比對欄優先 orderId(入庫單號)，表裡沒有則退回 sourceId(儲位)
  const idIdx = col('orderId') !== -1 ? col('orderId') : col('sourceId');
  if (idIdx === -1) return;
  for (let i = 1; i < palletCache.length; i++) {
    const row = palletCache[i];
    if (String(row[idIdx]) === String(key)) {
      const get = n => { const c = col(n); return c === -1 ? '' : row[c]; };
      document.getElementById('palletSku').textContent  = get('sku')  || '—';
      document.getElementById('palletName').textContent = get('name') || '—';
      document.getElementById('palletQty').textContent  = `${get('qtyBox') || 0} 箱 / ${get('qtyPcs') || 0} 件`;
      document.getElementById('palletDest').textContent = get('destLocation') || '—';
      return;
    }
  }
}

function showPalletId(id) {
  document.getElementById('palletId').textContent = id;
}

// ============ 拍照 ============
async function capturePhoto() {
  document.getElementById('captureBtn').disabled = true;

  // 倒數計時：3 → 2 → 1 → 拍照
  for (let i = 3; i >= 1; i--) {
    showMsg(`請拍攝整個棧版並保持不動\n\n${i}`, 'info');
    await new Promise(r => setTimeout(r, 1000));
  }

  showMsg('<span class="spinner"></span>上傳中...', 'loading');
  try {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const vw = video.videoWidth, vh = video.videoHeight;
    canvas.width = vw;
    canvas.height = vh;

    // 等待後才截圖
    await new Promise(r => setTimeout(r, 100));
    const ctx = canvas.getContext('2d');

    // 軟體變焦：裁切中央區域以符合畫面所見（硬體變焦則畫面已是放大後的，直接畫即可）
    const z = (APP.zoomMode === 'software' && APP.softZoom) ? APP.softZoom : 1;
    if (z > 1) {
      const sw = vw / z, sh = vh / z;
      const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, vw, vh);
    } else {
      ctx.drawImage(video, 0, 0);
    }

    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

    // 拍照成功提示 + 雙振動
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    await uploadPhoto(dataUrl);
  } catch (e) {
    showMsg('❌ 拍照失敗：' + e.message, 'error');
    document.getElementById('captureBtn').disabled = false;
  }
}

// ============ 上傳 ============
async function uploadPhoto(dataUrl) {
  showMsg('<span class="spinner"></span>上傳中...', 'loading');
  const count = APP.uploadCount + 1;
  const ts = new Date();
  // 檔名：入庫單號_序號_拍攝時間（沿用 6/22 邏輯，identifier 改為入庫單號）
  const filename = `${APP.orderId}_${count}_${fmtStamp(ts)}.jpg`;

  const res = await fetch(CONFIG.webAppUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'uploadPhoto', imageData: dataUrl, filename, folderId: CONFIG.folderId || '' })
  });
  const j = await res.json().catch(() => ({ ok: false }));
  if (!j.ok) throw new Error(j.error || '後端回傳失敗');

  APP.uploadCount = count;
  appendLog(ts, count, j.url || '').catch(() => {});

  const timeStr = ts.toLocaleTimeString('zh-TW');
  showMsg(`<div class="upload-badge">✅ 第 ${count} 張已上傳</div><div style="font-size:12px;margin-top:4px;color:#155724">${timeStr}</div>`, 'success');
  document.getElementById('status').textContent = `✅ ${count} 張已存`;
  goDone(count);
}

// ============ 記錄 ============
async function appendLog(ts, count, fileUrl) {
  const opTime = fmtStamp(ts).replace('_', ' ');
  await fetch(CONFIG.webAppUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'append', tab: CONFIG.logTab,
      rows: [[ts.toISOString(), APP.orderId, count, fileUrl, '成功', opTime]]
    })
  });
}

// ============ 操作按鈕 ============
function retryPhoto() {
  goPhoto();
}

function nextPallet() {
  // 清空並回到掃描模式
  showMsg('📲 請對準下一板 QR Code', 'info');
  goScan();
}

// ============ 手動輸入（備用） ============
function manualIdMode() {
  stopScanLoop();
  const modal = document.getElementById('manualModal');
  modal.style.display = 'flex';
  document.getElementById('manualInput').value = '';
  document.getElementById('manualInput').focus();
}

function closeManual() {
  document.getElementById('manualModal').style.display = 'none';
  if (STATE === 'scan') startScanLoop();
}

function confirmManual() {
  const val = document.getElementById('manualInput').value.trim();
  if (!val) { alert('請輸入棧板 ID'); return; }
  document.getElementById('manualModal').style.display = 'none';
  onQRFound(val);
}

document.getElementById('manualInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmManual();
});

// ============ 工具 ============
function showBtns(activeId) {
  ['btnScan','btnConfirm','btnPhoto','btnDone'].forEach(id => {
    document.getElementById(id).style.display = id === activeId ? 'flex' : 'none';
  });
}

function showMsg(html, type = 'info') {
  document.getElementById('messageArea').innerHTML = `<div class="message ${type}">${html}</div>`;
}

function fmtStamp(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}

window.addEventListener('beforeunload', () => {
  stopScanLoop();
  if (APP.stream) APP.stream.getTracks().forEach(t => t.stop());
});
</script>
