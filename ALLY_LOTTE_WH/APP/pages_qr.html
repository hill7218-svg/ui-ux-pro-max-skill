<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<title>掃我開 photo.html</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;font-family:sans-serif;gap:20px}
.box{background:#fff;padding:32px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1);text-align:center}
h2{color:#0D1B3E;margin-bottom:8px}
p{color:#666;font-size:13px;margin-bottom:20px}
#qr{display:inline-block}
.url{font-size:11px;color:#999;margin-top:16px;word-break:break-all;max-width:280px}
</style>
</head>
<body>
<div class="box">
  <h2>📷 照相驗收頁面</h2>
  <p>用手機掃描 QR Code</p>
  <div id="qr"></div>
  <div class="url">https://hill7218-svg.github.io/ui-ux-pro-max-skill/photo.html</div>
</div>
<script>
new QRCode(document.getElementById('qr'),{
  text:'https://hill7218-svg.github.io/ui-ux-pro-max-skill/photo.html',
  width:256,height:256,correctLevel:QRCode.CorrectLevel.M
});
</script>
</body>
</html>
