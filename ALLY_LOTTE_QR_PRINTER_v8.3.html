<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Noto Sans TC",sans-serif;background:#f5f5f5}
.layout{display:flex;gap:16px;padding:16px;align-items:flex-start}
.panel{width:340px;flex-shrink:0;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:18px;position:sticky;top:16px;max-height:96vh;overflow-y:auto}
.main{flex:1;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:24px}
h1{color:#0D1B3E;font-size:22px;margin-bottom:4px}
.subtitle{color:#6B7A99;font-size:12px;margin-bottom:16px}
h2{color:#0D1B3E;font-size:16px;margin:14px 0 10px}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.setup-group{display:flex;flex-direction:column}
.setup-label{font-size:11px;font-weight:700;color:#6B7A99;text-transform:uppercase;margin-bottom:4px}
.setup-input,.setup-select{padding:8px 10px;border:1.5px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.btn{padding:10px 16px;background:#0D1B3E;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{background:#1A2F6B}
.btn.green{background:#007B6F}.btn.green:hover{background:#00968a}
.btn.gray{background:#6B7A99}.btn.gray:hover{background:#56657f}
.btn.sm{padding:6px 10px;font-size:12px}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.btnrow .btn{flex:1;min-width:90px}

/* 排版控制 */
.fld-ctl{border:1px solid #eee;border-radius:6px;padding:8px 10px;margin-bottom:8px;background:#fafbfc}
.fld-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.fld-name{font-size:13px;font-weight:700;color:#0D1B3E}
.fld-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#6B7A99;margin-top:3px}
.fld-row input[type=range]{flex:1}
.fld-row .val{width:42px;text-align:right;font-family:"JetBrains Mono",monospace;color:#0D1B3E;font-weight:700}
.tog{cursor:pointer;font-size:12px;color:#007B6F;user-select:none}
.hint{font-size:11px;color:#856404;background:#fff3cd;padding:8px 10px;border-radius:4px;margin:8px 0;line-height:1.5}
.msg{font-size:12px;padding:8px 10px;border-radius:4px;margin:8px 0;background:#d4edda;color:#155724}

.stats{display:flex;gap:18px;margin-bottom:14px;font-size:13px;color:#6B7A99}
.stats b{color:#0D1B3E;font-size:18px}

/* 貼紙 125mm，欄位以 data-fk 包裝，支援 translate 位移 + 字體倍數 */
.sticker{width:125mm;height:125mm;border:1px dashed #ccc;display:inline-block;margin:5px;padding:7.5mm;background:#fff;page-break-inside:avoid;break-inside:avoid;position:relative;overflow:hidden}
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125mm,1fr));gap:10px;margin-top:8px}
.sk-content{display:flex;flex-direction:column;height:100%}
.fk{will-change:transform}
.fk.dragging{outline:2px dashed #007B6F;cursor:move}
.editmode .fk{cursor:move}
.editmode .fk:hover{outline:1px dashed #aaa}
.sk-row-top{display:flex;justify-content:space-between;color:#444;font-weight:700}
.sk-sku{font-family:"JetBrains Mono",monospace;font-weight:700;color:#000;text-align:center}
.sk-name{color:#000;text-align:center;line-height:1.3;font-weight:600}
.sk-qty{font-weight:700;color:#000;text-align:center}
.sk-ean{color:#444;text-align:center;font-family:"JetBrains Mono",monospace}
.sk-srcloc{color:#888;text-align:center}
.sk-divider{border-top:1.25px solid #000;margin:4px 0}
.sk-orderlbl{color:#444;text-align:center;font-weight:700}
.sk-order{font-family:"JetBrains Mono",monospace;font-weight:700;text-align:center;color:#000}
.sk-bar{width:100%;display:block;margin:1.25px 0}
.sk-mid{flex:1;display:flex;align-items:center;justify-content:space-around;gap:5px;margin:2.5px 0}
.sk-qr{display:flex;flex-direction:column;align-items:center}
.sk-qr .cap{color:#888;margin-top:2px}
.sk-destbox{display:flex;flex-direction:column;align-items:center;flex:1}
.sk-destlbl{font-weight:700;color:#c00}
.sk-dest{font-family:"JetBrains Mono",monospace;font-weight:700;color:#c00;text-align:center}
.sk-footer{color:#666;text-align:center}

@page{margin:8mm}
@media print{
  body{background:#fff}
  .layout{display:block;padding:0}
  .panel{display:none!important}
  .main{box-shadow:none;padding:0;border-radius:0}
  h1,.subtitle,h2,.stats,.setup-grid,.btnrow,.hint,.msg{display:none!important}
  .sticker-grid{margin:0}
  .sticker{margin:0;border:1px solid #ccc;page-break-inside:avoid}
  .editmode .fk:hover,.fk.dragging{outline:none}
}
</style>
</head>
<body>
<div class="layout">
  <!-- 控制面板 -->
  <div class="panel">
    <h1>🎛️ 排版控制</h1>
    <div class="subtitle">調整每欄字體倍數與位置，存檔後列印</div>

    <h2>產生範圍</h2>
    <div class="setup-grid">
      <div class="setup-group"><label class="setup-label">行次</label>
        <select id="tripSelect" class="setup-select"><option value="ALL">全部187板</option></select></div>
      <div class="setup-group"><label class="setup-label">起始板號</label>
        <input type="number" id="startNo" class="setup-input" value="1" min="1" max="187"></div>
      <div class="setup-group"><label class="setup-label">張數</label>
        <input type="number" id="count" class="setup-input" value="3" min="1" max="187"></div>
      <div class="setup-group"><label class="setup-label">全域字體倍數</label>
        <input type="number" id="globalScale" class="setup-input" value="1" min="0.5" max="3" step="0.05"></div>
    </div>
    <div class="btnrow">
      <button class="btn" onclick="generate()">① 產生貼紙</button>
      <button class="btn green" onclick="window.print()">② 🖨️ 列印/PDF</button>
    </div>

    <h2>✋ 自由排版</h2>
    <div class="hint">勾選「拖曳模式」後，可在貼紙上直接拖動任一欄位調整位置；滑桿調字體倍數。所有變更會套用到每一張貼紙並自動存檔。</div>
    <label class="tog"><input type="checkbox" id="editToggle" onchange="toggleEdit()"> 啟用拖曳模式</label>

    <h2>各欄位設定</h2>
    <div id="fieldControls"></div>

    <div class="btnrow">
      <button class="btn gray sm" onclick="saveLayout()">💾 存檔</button>
      <button class="btn gray sm" onclick="resetLayout()">↺ 重設預設</button>
    </div>
    <div class="btnrow">
      <button class="btn gray sm" onclick="exportLayout()">⬇ 匯出排版</button>
      <button class="btn gray sm" onclick="document.getElementById('importFile').click()">⬆ 匯入排版</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importLayout(event)">
    </div>
    <div id="msg" class="msg" style="display:none"></div>
  </div>

  <!-- 預覽 -->
  <div class="main">
    <h1>🏷️ 板標列印器 v8.3</h1>
    <div class="subtitle">可調排版 · 國際條碼/箱件數預設+50% · QR=sourceId · Air-con無儍位 · Regular自動BI配發</div>
    <div class="stats">
      <span>內嵌 <b id="totalData">0</b> 板</span>
      <span>本次 <b id="genCount">0</b> 張</span>
      <span>BI配發 <b id="biCount">0</b></span>
    </div>
    <div id="stickerContainer" class="sticker-grid"></div>
  </div>
</div>

// ── 欄位定義：key / 中文標籤 / 基準字級(px) / 類型 ──
// type: text=文字字級 / qr=QR尺寸 / bar=條碼高度
const FIELDS = [
  {key:'rowtop',  label:'頂列(#板號/行次)', base:13.75, type:'text'},
  {key:'sku',     label:'貨號 SKU',          base:25,    type:'text'},
  {key:'name',    label:'品名',              base:15,    type:'text'},
  {key:'qty',     label:'箱數/件數',         base:18.75, type:'text'},
  {key:'ean',     label:'國際條碼(數字)',    base:10,    type:'text'},
  {key:'srcloc',  label:'來源儲位/效期',     base:12.5,  type:'text'},
  {key:'orderlbl',label:'「入庫單號」標題',  base:12.5,  type:'text'},
  {key:'order',   label:'入庫單號(源ID)',    base:16.25, type:'text'},
  {key:'orderbar',label:'入庫單號條碼',      base:42.5,  type:'bar'},
  {key:'qr',      label:'QR Code',           base:142,   type:'qr'},
  {key:'destlbl', label:'「上架儍位」標題',  base:13.75, type:'text'},
  {key:'dest',    label:'上架儍位',          base:32.5,  type:'text'},
  {key:'destbar', label:'上架儍位條碼',      base:42.5,  type:'bar'},
  {key:'footer',  label:'底部來源單號',      base:12.5,  type:'text'},
];

// ── 預設排版：箱件數 + 國際條碼 預設 +50% ──
function defaultLayout(){
  const L={};
  FIELDS.forEach(f=>{ L[f.key]={scale:1, dx:0, dy:0, hidden:false}; });
  L.qty.scale = 1.5;   // 箱數/件數 +50%
  L.ean.scale = 1.5;   // 國際條碼 +50%
  return L;
}

const LS_KEY='lotte_sticker_layout_v83';
let LAYOUT = loadSavedLayout() || defaultLayout();

function loadSavedLayout(){
  try{ const s=localStorage.getItem(LS_KEY); if(s){ const o=JSON.parse(s);
    // 補齊新欄位
    const d=defaultLayout(); Object.keys(d).forEach(k=>{ if(!o[k]) o[k]=d[k]; }); return o; } }catch(e){}
  return null;
}
function saveLayout(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(LAYOUT)); showMsg('✅ 已存檔（下次開啟自動套用）'); }catch(e){ showMsg('⚠️ 存檔失敗：'+e.message); } }
function resetLayout(){ LAYOUT=defaultLayout(); buildControls(); applyLayout(); saveLayout(); showMsg('↺ 已重設為預設（箱件數/國際條碼 +50%）'); }
function exportLayout(){
  const blob=new Blob([JSON.stringify(LAYOUT,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sticker_layout.json'; a.click();
  showMsg('⬇ 已匯出 sticker_layout.json');
}
function importLayout(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=function(){ try{ LAYOUT=JSON.parse(r.result); const d=defaultLayout(); Object.keys(d).forEach(k=>{if(!LAYOUT[k])LAYOUT[k]=d[k];}); buildControls(); applyLayout(); saveLayout(); showMsg('⬆ 已匯入排版'); }catch(e){ showMsg('⚠️ 匯入失敗：'+e.message);} };
  r.readAsText(f);
}
function showMsg(t){ const e=document.getElementById('msg'); e.textContent=t; e.style.display='block'; clearTimeout(e._t); e._t=setTimeout(()=>e.style.display='none',3000); }

// ── 建立控制面板 ──
function buildControls(){
  const box=document.getElementById('fieldControls'); box.innerHTML='';
  FIELDS.forEach(f=>{
    const L=LAYOUT[f.key];
    const div=document.createElement('div'); div.className='fld-ctl';
    div.innerHTML=`
      <div class="fld-top">
        <span class="fld-name">${f.label}</span>
        <label class="tog"><input type="checkbox" ${L.hidden?'':'checked'} onchange="setHidden('${f.key}',!this.checked)"> 顯示</label>
      </div>
      <div class="fld-row">倍數
        <input type="range" min="0.5" max="3" step="0.05" value="${L.scale}" oninput="setScale('${f.key}',this.value)">
        <span class="val" id="val-${f.key}">${(+L.scale).toFixed(2)}×</span>
      </div>
      <div class="fld-row">↕位置
        <input type="range" min="-60" max="60" step="1" value="${L.dy}" oninput="setDY('${f.key}',this.value)">
        <span class="val" id="dy-${f.key}">${L.dy}</span>
      </div>`;
    box.appendChild(div);
  });
}
function setScale(k,v){ LAYOUT[k].scale=+v; document.getElementById('val-'+k).textContent=(+v).toFixed(2)+'×'; applyLayout(); saveLayout(); }
function setDY(k,v){ LAYOUT[k].dy=+v; document.getElementById('dy-'+k).textContent=v; applyLayout(); saveLayout(); }
function setHidden(k,h){ LAYOUT[k].hidden=h; applyLayout(); saveLayout(); }

// ── 套用排版到所有貼紙 ──
function applyLayout(){
  const gScale=parseFloat(document.getElementById('globalScale').value)||1;
  document.querySelectorAll('.sticker').forEach(st=>{
    FIELDS.forEach(f=>{
      const L=LAYOUT[f.key];
      st.querySelectorAll('[data-fk="'+f.key+'"]').forEach(el=>{
        el.style.display = L.hidden ? 'none' : '';
        el.style.transform = 'translate('+L.dx+'px,'+L.dy+'px)';
        const sz=f.base*L.scale*gScale;
        if(f.type==='text'){ el.style.fontSize=sz+'px'; }
        else if(f.type==='qr'){ const c=el.querySelector('canvas,img'); if(c){ c.style.width=sz+'px'; c.style.height=sz+'px'; } }
        else if(f.type==='bar'){ el.style.height=sz+'px'; const svg=el.querySelector('svg'); if(svg) svg.style.height=sz+'px'; }
      });
    });
  });
}

// ── 拖曳模式 ──
let editMode=false;
function toggleEdit(){
  editMode=document.getElementById('editToggle').checked;
  document.getElementById('stickerContainer').classList.toggle('editmode',editMode);
}
function attachDrag(st){
  st.querySelectorAll('.fk').forEach(el=>{
    el.addEventListener('mousedown',function(e){
      if(!editMode) return;
      e.preventDefault();
      const fk=el.getAttribute('data-fk'); const L=LAYOUT[fk];
      const sx=e.clientX, sy=e.clientY, ox=L.dx, oy=L.dy;
      el.classList.add('dragging');
      function mv(ev){ L.dx=ox+(ev.clientX-sx); L.dy=oy+(ev.clientY-sy); applyLayout(); }
      function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); el.classList.remove('dragging'); buildControls(); saveLayout(); }
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
  });
}

// ── 初始化下拉 + 統計 ──
(function(){
  const trips=[...new Set(PALLET_DATA.map(p=>p.trip))];
  const sel=document.getElementById('tripSelect');
  trips.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t+' ('+PALLET_DATA.filter(p=>p.trip===t).length+'板)';sel.appendChild(o);});
  document.getElementById('totalData').textContent=PALLET_DATA.length;
  document.getElementById('biCount').textContent=PALLET_DATA.filter(p=>p.destLoc&&p.destLoc.trim()).length;
  buildControls();
})();

// ── 產生貼紙 ──
function generate(){
  const trip=document.getElementById('tripSelect').value;
  const startNo=parseInt(document.getElementById('startNo').value)||1;
  const count=parseInt(document.getElementById('count').value)||3;
  let pool = trip==='ALL' ? PALLET_DATA : PALLET_DATA.filter(p=>p.trip===trip);
  let list = trip==='ALL' ? pool.filter(p=>p.no>=startNo).slice(0,count) : pool.slice(0,count);

  const container=document.getElementById('stickerContainer'); container.innerHTML='';
  list.forEach(p=>{
    const dest = p.destLoc && p.destLoc.trim() ? p.destLoc : '—';
    const st=document.createElement('div'); st.className='sticker';
    st.innerHTML=`
      <div class="sk-content">
        <div class="fk sk-row-top" data-fk="rowtop"><span>#${String(p.no).padStart(3,'0')}</span><span>${p.trip}</span></div>
        <div class="fk sk-sku" data-fk="sku">${p.sku}</div>
        <div class="fk sk-name" data-fk="name">${p.name}</div>
        <div class="fk sk-qty" data-fk="qty">${p.qtyBox} 箱 / ${p.qtyPcs} 件</div>
        <div class="fk sk-ean" data-fk="ean">國際條碼：${p.ean||'—'}</div>
        <div class="fk sk-srcloc" data-fk="srcloc">來源儲位 ${p.srcLoc}　效期 ${p.expDate}</div>
        <div class="sk-divider"></div>
        <div class="fk sk-orderlbl" data-fk="orderlbl">入庫單號</div>
        <div class="fk sk-order" data-fk="order">${p.sourceId}</div>
        <div class="fk sk-bar" data-fk="orderbar"><svg id="ob-${p.no}" style="width:100%;height:100%"></svg></div>
        <div class="sk-mid">
          <div class="fk sk-qr" data-fk="qr"><div id="qr-${p.no}"></div><div class="cap">掃我讀源ID</div></div>
          <div class="sk-destbox">
            <div class="fk sk-destlbl" data-fk="destlbl">上架儍位</div>
            <div class="fk sk-dest" data-fk="dest">${dest}</div>
            <div class="fk sk-bar" data-fk="destbar"><svg id="lb-${p.no}" style="width:100%;height:100%"></svg></div>
          </div>
        </div>
        <div class="fk sk-footer" data-fk="footer">來源單號 ${p.sourceId}　移倉日 06/22</div>
      </div>`;
    container.appendChild(st);

    setTimeout(()=>{
      try{JsBarcode('#ob-'+p.no,p.sourceId,{format:'CODE128',width:1.6,height:42.5,displayValue:false,margin:0});}catch(e){}
      if(dest!=='—'){ try{JsBarcode('#lb-'+p.no,dest,{format:'CODE128',width:1.4,height:42.5,displayValue:false,margin:0});}catch(e){} }
      try{ new QRCode(document.getElementById('qr-'+p.no),{text:p.sourceId,width:142,height:142,correctLevel:QRCode.CorrectLevel.M}); }catch(e){}
      applyLayout();
    },p.no*8);
    attachDrag(st);
  });
  document.getElementById('genCount').textContent=list.length;
  applyLayout();
  toggleEdit();
}
</script>
