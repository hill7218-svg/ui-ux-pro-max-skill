<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樂天移倉點驗系統 v8.1</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0D1B3E;color:#fff;padding:8px}
  .container{max-width:520px;margin:0 auto}
  .screen{display:none;padding:12px;border-radius:8px;background:#1a2a52;min-height:92vh}
  .screen.active{display:flex;flex-direction:column}

  /* S0 */
  #s0{justify-content:center;gap:18px}
  .s0-title{text-align:center;font-size:26px;font-weight:700;color:#4dd0e1}
  .s0-sub{text-align:center;font-size:13px;color:#8aa}
  .s0-input{padding:16px;font-size:18px;border:2px solid #4dd0e1;border-radius:6px;background:#0D1B3E;color:#fff;text-align:center}
  .s0-btn{padding:16px;font-size:16px;background:#4dd0e1;color:#0D1B3E;border:none;border-radius:6px;font-weight:700;cursor:pointer}
  .s0-btn:hover{background:#80deea}

  /* header */
  .hdr{font-size:13px;color:#aaa;padding:8px;border-bottom:1px solid #444;display:flex;justify-content:space-between}
  .hdr b{color:#4dd0e1}

  /* S1 */
  .scanner{display:flex;flex-direction:column;gap:8px;padding:12px;background:#0a1428;border-radius:6px;border:2px solid #4dd0e1;margin-top:10px}
  .lbl{font-size:12px;color:#9ab}
  .inp{padding:12px;font-size:16px;border:1px solid #444;background:#0D1B3E;color:#fff;border-radius:4px}
  .inp:focus{border-color:#4dd0e1;outline:none}
  .disp{padding:12px;background:#13202e;border-radius:6px;border-left:4px solid #555;font-size:13px;line-height:1.7;min-height:54px}
  .disp.ok{border-left-color:#66bb6a;background:#16331f}
  .disp.warn{border-left-color:#ff9800;background:#3a2a14}
  .disp.err{border-left-color:#ef5350;background:#3a1818}
  .disp .big{font-size:15px;font-weight:700;color:#fff}
  .disp .ean{font-family:monospace;color:#9ab;font-size:12px}
  .disp .exp{color:#ffd54f;font-weight:700}
  .qrow{display:flex;gap:8px;align-items:center}
  .qinp{flex:1;padding:10px;font-size:20px;border:1px solid #4dd0e1;background:#0D1B3E;color:#4dd0e1;border-radius:4px;text-align:center;font-weight:700}
  .utog{padding:10px 16px;background:#4dd0e1;color:#0D1B3E;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:16px;min-width:56px}
  .seal{padding:16px;font-size:18px;background:#ff9800;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;margin-top:6px}
  .seal:hover{background:#ffb74d}
  .seal:disabled{background:#555;cursor:not-allowed}

  /* loc box */
  .locbox{padding:16px;background:#0a1428;border:3px solid #ffb300;border-radius:8px;text-align:center;margin:14px 0}
  .locbox .l{font-size:12px;color:#aaa;margin-bottom:6px}
  .locbox .v{font-size:44px;font-weight:700;color:#ffb300;font-family:"Courier New",monospace}

  /* progress */
  .prog{display:flex;gap:10px;font-size:12px;color:#9ab;padding:6px 8px;flex-wrap:wrap}
  .prog .p{background:#13202e;padding:4px 8px;border-radius:4px}
  .prog .p b{color:#4dd0e1}

  /* photo grid */
  .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
  .pslot{aspect-ratio:1;border:2px solid #444;border-radius:4px;display:flex;align-items:center;justify-content:center;background:#0a1428;cursor:pointer;font-size:12px;color:#778;position:relative}
  .pslot.filled{border-color:#4dd0e1;background-size:cover;background-position:center}
  .pslot.filled .num{position:absolute;top:2px;left:4px;background:rgba(0,0,0,.6);padding:0 4px;border-radius:3px;font-size:10px;color:#4dd0e1}
  .pslot.filled .chk{font-size:22px;color:#4dd0e1;text-shadow:0 0 4px #000}

  .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .bs{padding:10px 12px;font-size:13px;background:#37475f;color:#fff;border:none;border-radius:4px;cursor:pointer;flex:1;min-width:90px}
  .bs:hover{background:#48597a}
  .bs.red{background:#c62828}.bs.red:hover{background:#e53935}

  #toast{position:fixed;bottom:16px;left:12px;right:12px;max-width:500px;margin:0 auto;padding:12px 16px;background:#2e7d32;color:#fff;border-radius:6px;font-size:13px;z-index:99;display:none;white-space:pre-line;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  #toast.show{display:block}
  #toast.error{background:#c62828}
</style>
</head>
<body>
<div class="container">

  <!-- S0 輸入車號 -->
  <div id="s0" class="screen active">
    <div class="s0-title">🚚 樂天移倉點驗</div>
    <div class="s0-sub">6/22 · 共 <span id="s0-total">0</span> 板 · 輸入司機車號開始</div>
    <input id="truckInput" class="s0-input" type="text" placeholder="例：BBB-2262">
    <button class="s0-btn" onclick="startTrip()">開始點驗</button>
  </div>

  <!-- S1 點驗 -->
  <div id="s1" class="screen">
    <div class="hdr"><span>車號 <b id="s1-truck"></b></span><span>已封 <b id="s1-done">0</b>/<b id="s1-total">0</b></span></div>
    <div class="prog" id="s1-prog"></div>

    <div class="scanner">
      <div class="lbl">① 掃商品條碼（外箱 / 最小單位）</div>
      <input id="skuInput" class="inp" placeholder="刷商品條碼…">
      <div class="disp" id="s1-disp">待掃描商品…</div>

      <div class="lbl">② 輸入該板數量</div>
      <div class="qrow">
        <input id="qtyInput" class="qinp" type="number" placeholder="數量">
        <button class="utog" id="unitTog" onclick="toggleUnit()">箱</button>
      </div>

      <div class="lbl">③ 掃棧板標籤（入庫單號）→ 自動 DOUBLE CHECK</div>
      <input id="srcInput" class="inp" placeholder="刷入庫單條碼…">
      <div class="disp" id="s1-check">待刷入庫單…</div>

      <button class="seal" id="s1-next" onclick="goSeal()" disabled>① ② ③ 完成後啟用</button>
    </div>

    <div class="controls">
      <button class="bs" onclick="goToPhoto()">📷 拍照記錄</button>
      <button class="bs red" onclick="backToTruck()">返回車號</button>
    </div>
  </div>

  <!-- S3 儲位 + 封板 -->
  <div id="s3" class="screen">
    <div class="hdr"><span>封板確認</span><span id="s3-board"></span></div>
    <div class="disp ok" id="s3-disp" style="margin-top:10px"></div>
    <div class="locbox"><div class="l">預印儲位（貼紙綁定）</div><div class="v" id="s3-loc">—</div></div>
    <button class="seal" onclick="sealPallet()">✓ 確認封板 → 下一板</button>
    <div class="controls">
      <button class="bs" onclick="cancelSeal()">↩ 取消重點</button>
      <button class="bs red" onclick="closeShift()">結束點驗（關單）</button>
    </div>
  </div>

  <!-- 拍照 -->
  <div id="photo" class="screen">
    <div class="hdr"><span>📷 點驗照片（板 1~32）</span><span><b id="photo-cnt">0</b>/32</span></div>
    <div class="pgrid" id="pgrid"></div>
    <div class="controls">
      <button class="bs" onclick="clearPhotos()">🗑️ 清空</button>
      <button class="bs red" onclick="backToS1()">返回點驗</button>
    </div>
  </div>

</div>
<div id="toast"></div>

var LOG = [];

// ── 建索引：來源單號 → 棧板；每SKU應移總箱數 ──
var SOURCE_INDEX = {};   // sourceId -> pallet
var SKU_REMAIN = {};     // sku -> 剩餘應移箱數
var ALL_PALLETS = [];
Object.keys(PALLETS_6_22).forEach(function(trip){
  PALLETS_6_22[trip].forEach(function(p){
    p.trip = trip;
    SOURCE_INDEX[p.sourceId] = p;
    ALL_PALLETS.push(p);
    SKU_REMAIN[p.sku] = (SKU_REMAIN[p.sku] || 0) + (p.qtyBox || 0);
  });
});

var ST = { truck:'', unit:'box', sealed:{}, photos:[], cur:null };
var scanned = { sku:null, item:null, src:null, srcPallet:null };

function $(id){ return document.getElementById(id); }
function screen(n){ document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')}); $(n).classList.add('active'); }
function toast(m, err){ var t=$('toast'); t.textContent=m; t.className='show'+(err?' error':''); clearTimeout(window._tt); window._tt=setTimeout(function(){t.className=''}, 3200); }

// ── S0 ──
$('s0-total').textContent = ALL_PALLETS.length;
function startTrip(){
  var tk = $('truckInput').value.trim();
  if(!tk){ toast('❌ 請輸入車號', true); return; }
  ST.truck = tk; ST.sealed = {}; ST.photos = [];
  $('s1-truck').textContent = tk;
  $('s1-total').textContent = ALL_PALLETS.length;
  resetScan(); renderProg();
  screen('s1'); $('skuInput').focus();
}

// ── 掃商品條碼（外箱/最小單位）→ 自動帶出 ──
$('skuInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ onScanSku(); }});
$('skuInput').addEventListener('change', onScanSku);
function onScanSku(){
  var code = $('skuInput').value.trim();
  if(!code) return;
  // 條碼 → SKU；或直接輸入 SKU
  var sku = BARCODE_MAP[code] || (ITEM_MASTER[code] ? code : null);
  if(!sku){ scanned.sku=null; scanned.item=null; setDisp('s1-disp','err','❌ 查無此條碼 / 品號：'+code); checkReady(); return; }
  var it = ITEM_MASTER[sku] || {};
  scanned.sku = sku; scanned.item = it;
  var unit = (code===it.eanCase) ? '（外箱碼）' : (code===it.eanPcs ? '（最小單位碼）' : '');
  setDisp('s1-disp','ok',
    '<div class="big">'+sku+' '+unit+'</div>'+
    '<div>'+(it.name||'')+'</div>'+
    '<div class="ean">外箱碼 '+(it.eanCase||'—')+' · 每箱 '+(it.casePack||'?')+' '+'</div>'+
    '<div class="exp">應移標準箱數/板：'+(it.palletStd||'?')+' 箱</div>');
  // 預填數量為標準棧板量
  if(!$('qtyInput').value && it.palletStd) $('qtyInput').value = it.palletStd;
  checkReady(); $('srcInput').focus();
}

function toggleUnit(){ ST.unit = ST.unit==='box'?'pcs':'box'; $('unitTog').textContent = ST.unit==='box'?'箱':'盒'; }

// ── 掃入庫單號 → DOUBLE CHECK ──
$('srcInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ onScanSrc(); }});
$('srcInput').addEventListener('change', onScanSrc);
function onScanSrc(){
  var src = $('srcInput').value.trim();
  if(!src) return;
  var p = SOURCE_INDEX[src];
  if(!p){ scanned.src=null; scanned.srcPallet=null; setDisp('s1-check','err','❌ 查無此入庫單號：'+src); checkReady(); return; }
  if(ST.sealed[src]){ setDisp('s1-check','warn','⚠️ 此入庫單已封板過：'+src); }
  scanned.src = src; scanned.srcPallet = p;
  // DOUBLE CHECK：掃到的商品 vs 入庫單預期品項
  if(scanned.sku && scanned.sku !== p.sku){
    setDisp('s1-check','err',
      '🔴 不一致！\n入庫單預期：'+p.sku+'（'+(ITEM_MASTER[p.sku]?ITEM_MASTER[p.sku].name:'')+'）\n你掃的商品：'+scanned.sku);
  } else {
    setDisp('s1-check','ok',
      '🟢 一致 ✓\n入庫單 '+src+'\n品項 '+p.sku+' · 預印儲位 '+p.loc);
  }
  checkReady();
}

function setDisp(id, cls, html){ var d=$(id); d.className='disp '+cls; d.innerHTML=html; }
function checkReady(){
  var ok = scanned.sku && scanned.srcPallet && (parseInt($('qtyInput').value)>0)
        && scanned.sku === scanned.srcPallet.sku;
  var b=$('s1-next');
  b.disabled = !ok;
  b.textContent = ok ? '✓ 進入封板（顯示儲位）' : '完成 ①商品 ②數量 ③入庫單 後啟用';
}
$('qtyInput').addEventListener('input', checkReady);

function resetScan(){
  scanned={sku:null,item:null,src:null,srcPallet:null};
  $('skuInput').value=''; $('qtyInput').value=''; $('srcInput').value='';
  setDisp('s1-disp','','待掃描商品…'); setDisp('s1-check','','待刷入庫單…');
  checkReady();
}

// ── 進封板 ──
function goSeal(){
  var p = scanned.srcPallet;
  ST.cur = { pallet:p, qty:parseInt($('qtyInput').value), unit:ST.unit };
  $('s3-board').textContent = '入庫單 '+p.sourceId.split('-').pop();
  $('s3-disp').innerHTML =
    '<div class="big">'+p.sku+'</div><div>'+(ITEM_MASTER[p.sku]?ITEM_MASTER[p.sku].name:p.name)+'</div>'+
    '<div>點驗數量 <b>'+ST.cur.qty+' '+(ST.unit==='box'?'箱':'盒')+'</b></div>'+
    '<div class="ean">入庫單 '+p.sourceId+'</div>';
  $('s3-loc').textContent = p.loc;
  screen('s3');
}
function cancelSeal(){ screen('s1'); $('skuInput').focus(); }

function sealPallet(){
  var c = ST.cur, p = c.pallet;
  ST.sealed[p.sourceId] = { qty:c.qty, unit:c.unit, ts:new Date().toLocaleString('zh-TW') };
  // 後台扣除剩餘箱數
  var boxes = c.unit==='box' ? c.qty : Math.round(c.qty / (ITEM_MASTER[p.sku] && ITEM_MASTER[p.sku].casePack || 1));
  SKU_REMAIN[p.sku] = Math.max(0, (SKU_REMAIN[p.sku]||0) - boxes);
  LOG.push([new Date().toLocaleString('zh-TW'), ST.truck, p.trip, '封板', p.sourceId, p.sku, c.qty, (c.unit==='box'?'箱':'盒'), p.loc]);
  toast('✅ 已封板 '+p.sourceId+'\n儲位 '+p.loc+' · '+p.sku+' 剩餘 '+SKU_REMAIN[p.sku]+' 箱');
  renderProg();
  resetScan(); screen('s1'); $('skuInput').focus();
}

function renderProg(){
  $('s1-done').textContent = Object.keys(ST.sealed).length;
  var html='';
  Object.keys(SKU_REMAIN).forEach(function(sku){
    html += '<span class="p">'+sku+' 剩 <b>'+SKU_REMAIN[sku]+'</b> 箱</span>';
  });
  $('s1-prog').innerHTML = html;
}

// ── 拍照 32 格 ──
function goToPhoto(){ buildGrid(); screen('photo'); }
function buildGrid(){
  var g=$('pgrid'); g.innerHTML='';
  for(var i=0;i<32;i++){
    var s=document.createElement('div'); s.className='pslot';
    if(ST.photos[i]){ s.classList.add('filled'); s.style.backgroundImage='url('+ST.photos[i]+')'; s.innerHTML='<span class="num">板'+(i+1)+'</span><span class="chk">✓</span>'; }
    else s.innerHTML='板 '+(i+1);
    (function(idx){ s.onclick=function(){ capture(idx); }; })(i);
    g.appendChild(s);
  }
  $('photo-cnt').textContent = ST.photos.filter(Boolean).length;
}
function capture(i){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=function(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(ev){ ST.photos[i]=ev.target.result; buildGrid(); toast('✓ 板 '+(i+1)+' 已拍照'); }; r.readAsDataURL(f); };
  inp.click();
}
function clearPhotos(){ if(confirm('清空所有照片？')){ ST.photos=[]; buildGrid(); } }
function backToS1(){ screen('s1'); $('skuInput').focus(); }

// ── 返回 / 關單 ──
function backToTruck(){ screen('s0'); $('truckInput').value=''; $('truckInput').focus(); }
function closeShift(){
  var n=Object.keys(ST.sealed).length;
  if(!confirm('結束點驗並關單？\n已封板 '+n+' 板 · 照片 '+ST.photos.filter(Boolean).length+' 張\n（log 將回填 Google Sheet）')) return;
  uploadLog();
}
function uploadLog(){
  // TODO: 接 GAS append「操作記錄」分頁
  console.log('LOG to upload:', LOG);
  toast('✅ 已記錄 '+LOG.length+' 筆 log（關單）');
  setTimeout(backToTruck, 1500);
}

window.addEventListener('load', function(){ $('truckInput').focus(); });
</script>
